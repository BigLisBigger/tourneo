name: Build Applications

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run backend:build

      - name: Test backend
        run: npm run backend:test

      - name: Upload backend build
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: apps/backend/dist
          if-no-files-found: error

  mobile:
    name: Expo Mobile App
    runs-on: ubuntu-latest
    env:
      CI: true
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run mobile:typecheck

      - name: Test mobile app
        run: npm run mobile:test

      - name: Build Expo bundles
        run: npm run mobile:build

      - name: Upload Expo export
        uses: actions/upload-artifact@v4
        with:
          name: mobile-expo-export
          path: apps/mobile/dist
          if-no-files-found: error

  admin-dashboard:
    name: Admin Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check static dashboard
        run: npm run admin:check

      - name: Upload static dashboard
        uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard
          path: apps/admin-dashboard
          if-no-files-found: error
