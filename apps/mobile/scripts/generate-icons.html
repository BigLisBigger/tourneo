<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turneo Icon Generator</title>
<style>
  body { margin: 0; padding: 20px; background: #1a1a1a; font-family: system-ui; display: flex; flex-wrap: wrap; gap: 20px; }
  canvas { border: 1px solid #333; border-radius: 8px; }
  .label { color: #fff; font-size: 12px; text-align: center; margin-top: 4px; }
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  canvas.width = size;
  canvas.height = size;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#0A7E8C');
  grad.addColorStop(0.5, '#0B8F9E');
  grad.addColorStop(1, '#06616D');
  
  // Rounded rect background
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Subtle pattern overlay
  ctx.save();
  ctx.globalAlpha = 0.05;
  for (let i = 0; i < size; i += size * 0.03) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i + size * 0.5, size);
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.restore();

  const cx = size / 2;
  const cy = size / 2;

  // Trophy silhouette
  const ts = size * 0.28; // trophy scale
  
  // Trophy cup
  ctx.save();
  ctx.translate(cx, cy - size * 0.02);
  
  // Cup body
  ctx.beginPath();
  ctx.moveTo(-ts * 0.5, -ts * 0.55);
  ctx.lineTo(-ts * 0.55, -ts * 0.45);
  ctx.quadraticCurveTo(-ts * 0.5, ts * 0.1, -ts * 0.15, ts * 0.25);
  ctx.lineTo(ts * 0.15, ts * 0.25);
  ctx.quadraticCurveTo(ts * 0.5, ts * 0.1, ts * 0.55, -ts * 0.45);
  ctx.lineTo(ts * 0.5, -ts * 0.55);
  ctx.closePath();
  
  const cupGrad = ctx.createLinearGradient(0, -ts * 0.55, 0, ts * 0.25);
  cupGrad.addColorStop(0, '#FFD700');
  cupGrad.addColorStop(0.5, '#FFED4A');
  cupGrad.addColorStop(1, '#F0B800');
  ctx.fillStyle = cupGrad;
  ctx.fill();
  
  // Cup rim
  ctx.beginPath();
  ctx.ellipse(0, -ts * 0.52, ts * 0.52, ts * 0.08, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#FFE066';
  ctx.fill();

  // Handles
  ctx.lineWidth = ts * 0.08;
  ctx.strokeStyle = '#F0B800';
  ctx.lineCap = 'round';
  
  // Left handle
  ctx.beginPath();
  ctx.arc(-ts * 0.58, -ts * 0.2, ts * 0.18, -Math.PI * 0.5, Math.PI * 0.5);
  ctx.stroke();
  
  // Right handle
  ctx.beginPath();
  ctx.arc(ts * 0.58, -ts * 0.2, ts * 0.18, Math.PI * 0.5, -Math.PI * 0.5);
  ctx.stroke();

  // Stem
  ctx.fillStyle = '#E6A800';
  ctx.fillRect(-ts * 0.06, ts * 0.25, ts * 0.12, ts * 0.18);
  
  // Base
  ctx.beginPath();
  ctx.ellipse(0, ts * 0.45, ts * 0.25, ts * 0.06, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#F0B800';
  ctx.fill();
  
  // Padel ball on trophy
  const ballR = ts * 0.15;
  ctx.beginPath();
  ctx.arc(0, -ts * 0.2, ballR, 0, Math.PI * 2);
  ctx.fillStyle = '#E8654A';
  ctx.fill();
  
  // Ball line
  ctx.beginPath();
  ctx.arc(0, -ts * 0.2, ballR * 0.9, -0.3, Math.PI + 0.3);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = ts * 0.03;
  ctx.stroke();

  ctx.restore();

  // "T" letter watermark
  ctx.save();
  ctx.globalAlpha = 0.1;
  ctx.font = `bold ${size * 0.7}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('T', cx, cy + size * 0.05);
  ctx.restore();

  // Bottom text "TURNEO"
  ctx.font = `bold ${size * 0.09}px system-ui`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFFFFF';
  ctx.letterSpacing = `${size * 0.015}px`;
  ctx.fillText('TURNEO', cx, size * 0.92);
}

function drawSplash(canvas, w, h) {
  const ctx = canvas.getContext('2d');
  canvas.width = w;
  canvas.height = h;

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#0A7E8C');
  grad.addColorStop(1, '#06616D');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Logo centered
  const iconSize = Math.min(w, h) * 0.25;
  const tempCanvas = document.createElement('canvas');
  drawIcon(tempCanvas, iconSize);
  ctx.drawImage(tempCanvas, (w - iconSize) / 2, (h - iconSize) / 2 - h * 0.05);

  // Tagline
  ctx.font = `300 ${h * 0.018}px system-ui`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('Dein Turnier. Dein Spiel. Deine Community.', w / 2, h / 2 + iconSize * 0.45);
}

// Generate icons
const sizes = [
  { size: 1024, label: 'App Icon (1024x1024)' },
  { size: 512, label: 'Icon 512' },
  { size: 192, label: 'Adaptive Icon' },
];

sizes.forEach(({ size, label }) => {
  const wrapper = document.createElement('div');
  const canvas = document.createElement('canvas');
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = label;
  drawIcon(canvas, size);
  wrapper.appendChild(canvas);
  wrapper.appendChild(lbl);
  document.body.appendChild(wrapper);
});

// Splash
const splashWrapper = document.createElement('div');
const splashCanvas = document.createElement('canvas');
drawSplash(splashCanvas, 400, 800);
const splashLabel = document.createElement('div');
splashLabel.className = 'label';
splashLabel.textContent = 'Splash Screen (preview)';
splashWrapper.appendChild(splashCanvas);
splashWrapper.appendChild(splashLabel);
document.body.appendChild(splashWrapper);
</script>
</body>
</html>
